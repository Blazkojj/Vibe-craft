name: PortableEnderChest
version: '1.2'
main: com.example.portableenderchest.PortableEnderChestPlugin
api-version: '1.21'
author: YourName
description: Przenośny EnderChest dostępny komendą /ec.
commands:
  enderchest:
    description: Otwiera przenośny enderchest
    usage: /enderchest
    aliases: [ec, echest, pend]
permissions:
  portableenderchest.use:
    description: Pozwala użyć komendy /ec
    default: true