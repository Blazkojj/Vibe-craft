name: AdvancedPlots
version: '1.0'
main: pl.advancedplots.AdvancedPlotsPlugin
api-version: '1.21'
description: Zaawansowany system działek dla Paper 1.21.4
authors: [AdvancedPlugins]

commands:
  plot:
    description: Główna komenda systemu działek
    aliases: [p, dzialka, dz]
    usage: /plot <subkomenda>plotadmin:
    description: Komendy administracyjne działek
    aliases: [pa, dzialkaadmin]
    usage: /plotadmin <subkomenda>

permissions:
  advancedplots.use:
    description: Dostęp do podstawowych komend działek
    default: trueadvancedplots.claim:
    description: Możliwość claimowania działek
    default: true
  advancedplots.claim.auto:
    description: Możliwość auto-claima
    default: true
  advancedplots.bypass:
    description: Pomijanie ochrony działek (admin)
    default: op
  advancedplots.admin:
    description: Dostęp do komend administracyjnych
    default: op
  advancedplots.admin.bypass:
    description: Trwały bypass bez komendy
    default: false
  advancedplots.unlimited:
    description: Brak limitu działek
    default: false