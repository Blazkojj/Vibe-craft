name: CosmicCrates
version: '1.6'
main: com.cosmic.crates.CosmicCratesPlugin
api-version: '1.21'
author: CosmicDev
description: Premium system skrzynek lootowych z animowanym losowaniem, hologramami i bezpiecznymi kluczami PDC.

commands:
  cosmiccrates:
    description: Glowna komenda pluginu CosmicCrates
    aliases: [cc, crates, skrzynki]
    permission: cosmiccrates.use
    usage: |
      /cc give <gracz> <typ> <ilosc>
      /cc create <nazwa> <typ>
      /cc remove <nazwa>
      /cc list
      /cc reload
      /cc keys [gracz]
      /cc menu

permissions:
  cosmiccrates.admin:
    description: Dostep administracyjny do pluginu
    default: op
  cosmiccrates.use:
    description: Mozliwosc korzystania ze skrzynek
    default: true
  cosmiccrates.give:
    description: Mozliwosc wydawania kluczy
    default: op