# --- KONFIGURACJA PRZENOŚNEGO ENDERCHESTA ---

# Wiadomości (MiniMessage)
messages:
  prefix: "<dark_gray>[<gradient:#a855f7:#ec4899>EC</gradient>]</dark_gray> "
  no-permission: "<red>Nie masz uprawnień do tej akcji."
  player-only: "<red>Ta komenda może być wykonana tylko przez gracza."

# Tytuł wyświetlany na ekranie gracza przy otwarciu
title:
  enabled: true
  title: "<gradient:#a855f7:#ec4899>EnderChest"
  subtitle: "<dark_purple>Otwierasz swój ekwipunek..."
  fade-in: 10
  stay: 40
  fade-out: 10

# Efekty dźwiękowe przy otwarciu
effects:
  sound:
    enabled: true
    type: "BLOCK_ENDER_CHEST_OPEN"
    volume: 1.0
    pitch: 1.0